name: MCP GenMedia Go CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "experiments/mcp-genmedia/mcp-genmedia-go/**"
  pull_request:
    paths:
      - "experiments/mcp-genmedia/mcp-genmedia-go/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiments/mcp-genmedia/mcp-genmedia-go

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24"

    - name: Install dependencies
      run: go mod download
      working-directory: experiments/mcp-genmedia/mcp-genmedia-go/mcp-common

    - name: Setup mcptools
      run: go install github.com/f/mcptools/cmd/mcptools@latest

    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.5


    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Test, Build, Lint and Verify
      env:
        PROJECT_ID: test-project-id
      run: |
        for dir in mcp-avtool-go mcp-chirp3-go mcp-common mcp-gemini-go mcp-imagen-go mcp-lyria-go mcp-veo-go mcp-nanobanana-go; do
          echo "Processing $dir"
          cd $dir
          golangci-lint run ./...
          go test -v ./...
          go build ./...
          
          if [ -f "verify.sh" ]; then
            chmod +x verify.sh
            timeout 15s ./verify.sh
          fi
          cd ..
        done
