version: "2"

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
